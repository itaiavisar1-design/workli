<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>החשבון שלי — Workli</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .account-wrap { max-width: 680px; margin: 0 auto; padding: 40px 5% 80px; }

    /* ── HERO CARD ── */
    .hero-card {
      background: var(--black); border-radius: 20px;
      padding: 36px 32px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 24px;
      position: relative; overflow: hidden;
    }
    .hero-card::before {
      content: ''; position: absolute; top: -60px; left: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(79,110,247,0.3) 0%, transparent 70%);
    }
    .avatar-big {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 700; flex-shrink: 0;
      font-family: 'Space Grotesk', sans-serif;
      border: 3px solid rgba(255,255,255,0.15);
      position: relative; z-index: 1;
      cursor: pointer; overflow: hidden;
    }
    .avatar-big img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar-big:hover::after {
      content: '📷';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); display: flex;
      align-items: center; justify-content: center;
      font-size: 1.4rem; border-radius: 50%;
    }
    #avatar-input { display: none; }
    .hero-info { position: relative; z-index: 1; }
    .hero-info h2 { font-size: 1.4rem; font-weight: 900; color: #fff; margin-bottom: 4px; }
    .hero-info .hero-email { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
    .role-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(79,110,247,0.25); color: var(--accent2);
      border: 1px solid rgba(79,110,247,0.3); border-radius: 100px;
      padding: 4px 14px; font-size: 0.78rem; font-weight: 700;
    }

    /* ── SECTIONS ── */
    .section-card {
      background: #fff; border: 1.5px solid var(--border);
      border-radius: 16px; padding: 28px; margin-bottom: 16px;
    }
    .section-card h3 {
      font-size: 1rem; font-weight: 800; margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field.full { grid-column: 1 / -1; }
    .form-field label { font-size: 0.82rem; font-weight: 700; color: var(--muted); }
    .form-field input, .form-field textarea, .form-field select {
      padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-family: 'Heebo', sans-serif;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
      background: var(--white); color: var(--black);
    }
    .form-field input:focus, .form-field textarea:focus, .form-field select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,110,247,0.08);
    }
    .form-field textarea { min-height: 80px; resize: vertical; }

    .save-row { display: flex; align-items: center; gap: 14px; margin-top: 6px; }
    .save-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 12px 28px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      font-family: 'Heebo', sans-serif; transition: background 0.2s;
    }
    .save-btn:hover { background: #3a57e0; }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .save-msg { font-size: 0.85rem; color: var(--success); display: none; font-weight: 600; }
    .save-msg.show { display: block; }

    /* ── FREELANCER PROFILE CARD ── */
    .publish-card {
      background: linear-gradient(135deg, var(--accent) 0%, #7C3AED 100%);
      border-radius: 16px; padding: 28px; margin-bottom: 16px;
      color: #fff;
    }
    .publish-card h3 { font-size: 1rem; font-weight: 800; margin-bottom: 6px; color: #fff; }
    .publish-card p { font-size: 0.88rem; color: rgba(255,255,255,0.75); margin-bottom: 20px; }
    .publish-card a {
      background: #fff; color: var(--accent);
      border-radius: 10px; padding: 11px 24px;
      font-size: 0.9rem; font-weight: 700; text-decoration: none;
      display: inline-block; transition: transform 0.15s;
    }
    .publish-card a:hover { transform: translateY(-1px); }

    /* ── DANGER ZONE ── */
    .danger-btn {
      background: transparent; color: var(--error);
      border: 1.5px solid rgba(224,88,76,0.3); border-radius: 10px;
      padding: 10px 20px; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; font-family: 'Heebo', sans-serif;
      transition: all 0.2s;
    }
    .danger-btn:hover { background: var(--error); color: #fff; border-color: var(--error); }

    /* ── NAV USER ── */
    .nav-user { display: flex; align-items: center; gap: 10px; }
    .nav-avatar-sm {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.82rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-left: 8px; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Work<span>li</span></a>
  <div class="nav-user">
    <div class="nav-avatar-sm" id="nav-initial">?</div>
    <a href="browse.html" class="nav-link">חיפוש</a>
    <button onclick="logout()" class="nav-link" style="background:none; border:none; cursor:pointer; font-family:'Heebo',sans-serif; font-size:0.9rem; font-weight:600; color:var(--muted);">יציאה</button>
  </div>
</nav>

<div class="account-wrap">

  <!-- HERO -->
  <div class="hero-card">
    <div class="avatar-big" id="avatar-big" onclick="document.getElementById('avatar-input').click()" title="לחץ לשינוי תמונה">?</div>
    <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(event)" />
    <div class="hero-info">
      <h2 id="hero-name">טוען...</h2>
      <div class="hero-email" id="hero-email"></div>
      <div class="role-badge" id="hero-role">👤 פרילנסר</div>
    </div>
  </div>

  <!-- FREELANCER PUBLIC PROFILE — מוצג רק לפרילנסרים -->
  <div class="section-card" id="freelancer-section" style="display:none; border-color: var(--accent); border-width: 2px;">
    <h3>
      🚀 הפרופיל הציבורי שלך
      <span id="freelancer-status-badge" style="font-size:0.75rem; font-weight:700; padding:3px 10px; border-radius:100px; margin-right:8px;"></span>
    </h3>
    <p style="font-size:0.85rem; color:var(--muted); margin-bottom:18px;" id="freelancer-status-text"></p>
    <div class="form-grid">
      <div class="form-field">
        <label>תחום עבודה</label>
        <select id="f-category">
          <option value="" disabled selected>בחר תחום</option>
          <option value="עיצוב גרפי">עיצוב גרפי</option>
          <option value="פיתוח אתרים">פיתוח אתרים</option>
          <option value="סושיאל מדיה">סושיאל מדיה</option>
          <option value="עריכת וידאו">עריכת וידאו</option>
          <option value="כתיבה ותוכן">כתיבה ותוכן</option>
          <option value="צילום">צילום</option>
          <option value="שיווק דיגיטלי">שיווק דיגיטלי</option>
          <option value="AI Automation">AI Automation</option>
          <option value="מוזיקה ופודקאסט">מוזיקה ופודקאסט</option>
          <option value="שיעורים פרטיים">שיעורים פרטיים</option>
          <option value="אחר">אחר</option>
        </select>
      </div>
      <div class="form-field">
        <label>מחיר</label>
        <input type="number" id="f-price" placeholder="150" min="0" />
      </div>
      <div class="form-field">
        <label>יחידת מחיר</label>
        <select id="f-price-unit">
          <option value="לפרויקט">לפרויקט</option>
          <option value="לשעה">לשעה</option>
          <option value="לפוסט">לפוסט</option>
        </select>
      </div>
      <div class="form-field full">
        <label>תיאור השירות <span style="font-weight:400; color:var(--muted);">— מה אתה מציע ולמי</span></label>
        <textarea id="f-description" placeholder="לדוגמה: מעצב לוגואים ופוסטים לעסקים קטנים"></textarea>
      </div>
    </div>
    <div class="save-row">
      <button class="save-btn" id="freelancer-save-btn" onclick="saveFreelancerListing()">פרסם / עדכן פרופיל ציבורי</button>
      <span class="save-msg" id="freelancer-save-msg">✓ נשמר ופורסם!</span>
    </div>
    <div style="font-size:0.82rem; color:var(--error); margin-top:8px; display:none;" id="freelancer-error"></div>
  </div>

  <!-- PERSONAL INFO -->
  <div class="section-card">
    <h3>👤 פרטים אישיים</h3>
    <div class="form-grid">
      <div class="form-field">
        <label>שם מלא</label>
        <input type="text" id="p-name" placeholder="השם שלך" />
      </div>
      <div class="form-field">
        <label>טלפון / ווטסאפ</label>
        <input type="tel" id="p-phone" placeholder="05X-XXXXXXX" />
      </div>
      <div class="form-field full">
        <label>ספר על עצמך</label>
        <textarea id="p-bio" placeholder="מי אתה, מה אתה עושה, מה הניסיון שלך..."></textarea>
      </div>
    </div>
    <div class="save-row">
      <button class="save-btn" id="save-btn" onclick="saveProfile()">שמור שינויים</button>
      <span class="save-msg" id="save-msg">✓ נשמר בהצלחה!</span>
    </div>
  </div>

  <!-- CHANGE PASSWORD -->
  <div class="section-card">
    <h3>🔒 שינוי סיסמה</h3>
    <div class="form-grid">
      <div class="form-field">
        <label>סיסמה חדשה</label>
        <input type="password" id="new-password" placeholder="לפחות 6 תווים" />
      </div>
      <div class="form-field">
        <label>אימות סיסמה</label>
        <input type="password" id="confirm-password" placeholder="אותה סיסמה שוב" />
      </div>
    </div>
    <div class="save-row" style="margin-top:14px;">
      <button class="save-btn" onclick="changePassword()">עדכן סיסמה</button>
      <span class="save-msg" id="pass-msg">✓ הסיסמה עודכנה!</span>
    </div>
    <div style="font-size:0.82rem; color:var(--error); margin-top:8px; display:none;" id="pass-error"></div>
  </div>

  <!-- LOGOUT / DANGER -->
  <div class="section-card" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
    <div>
      <div style="font-weight:700; font-size:0.95rem;">יציאה מהחשבון</div>
      <div style="font-size:0.82rem; color:var(--muted);">תצטרך להתחבר שוב בכניסה הבאה</div>
    </div>
    <button class="danger-btn" onclick="logout()">התנתק</button>
  </div>

  <!-- DELETE ACCOUNT -->
  <div class="section-card" style="border-color: rgba(224,88,76,0.3);">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
      <div>
        <div style="font-weight:700; font-size:0.95rem; color:var(--error);">מחיקת חשבון</div>
        <div style="font-size:0.82rem; color:var(--muted);">פעולה זו תמחק את החשבון שלך לצמיתות ולא ניתנת לביטול</div>
      </div>
      <button class="danger-btn" onclick="confirmDeleteAccount()">מחק חשבון</button>
    </div>
    <div id="delete-confirm-box" style="display:none; margin-top:18px; padding-top:18px; border-top:1px solid var(--border);">
      <p style="font-size:0.88rem; margin-bottom:12px;">להקלדה לאישור: כתוב <strong>מחק</strong> בתיבה למטה</p>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <input type="text" id="delete-confirm-input" placeholder="כתוב מחק" style="flex:1; min-width:160px; padding:11px 14px; border:1.5px solid var(--error); border-radius:10px; font-family:'Heebo',sans-serif; outline:none;" />
        <button class="danger-btn" style="background:var(--error); color:#fff;" onclick="deleteAccount()">אישור סופי — מחק</button>
        <button class="danger-btn" style="border-color:var(--border); color:var(--muted);" onclick="document.getElementById('delete-confirm-box').style.display='none'">ביטול</button>
      </div>
    </div>
  </div>

</div>

<script src="config.js"></script>
<script>
  let currentUser = null;

  async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { window.location.href = 'auth.html'; return; }
    currentUser = session.user;

    // Load profile
    const { data: profile } = await supabaseClient
      .from('profiles').select('*').eq('id', currentUser.id).maybeSingle();

    const name = profile?.full_name || currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
    const email = currentUser.email;
    const role = profile?.role || currentUser.user_metadata?.role || 'client';
    const initial = name.charAt(0).toUpperCase();

    // Load avatar if exists
    if (profile?.avatar_url) {
      const avatarEl = document.getElementById('avatar-big');
      avatarEl.innerHTML = `<img src="${profile.avatar_url}" alt="avatar" />`;
    } else {
      document.getElementById('avatar-big').textContent = initial;
    }
    document.getElementById('nav-initial').textContent = initial;
    document.getElementById('hero-name').textContent = name;
    document.getElementById('hero-email').textContent = email;
    document.getElementById('hero-role').textContent = role === 'freelancer' ? '👤 פרילנסר' : '🏢 לקוח';

    // Fill form
    document.getElementById('p-name').value = profile?.full_name || name;
    document.getElementById('p-phone').value = profile?.phone || '';
    document.getElementById('p-bio').value = profile?.bio || '';

    // Show freelancer public-profile section for freelancers, and load existing listing if any
    if (role === 'freelancer') {
      const section = document.getElementById('freelancer-section');
      section.style.display = 'block';

      const { data: listing } = await supabaseClient
        .from('freelancers').select('*').eq('user_id', currentUser.id).maybeSingle();

      const badge = document.getElementById('freelancer-status-badge');
      const statusText = document.getElementById('freelancer-status-text');

      if (listing) {
        document.getElementById('f-category').value = listing.category || '';
        document.getElementById('f-price').value = listing.price || '';
        document.getElementById('f-price-unit').value = listing.price_unit || 'לפרויקט';
        document.getElementById('f-description').value = listing.description || '';

        if (listing.blocked) {
          badge.textContent = '🚫 חסום'; badge.style.background = 'rgba(224,88,76,0.1)'; badge.style.color = 'var(--error)';
          statusText.textContent = 'הפרופיל שלך נחסם על ידי הצוות. צור קשר לפרטים.';
        } else {
          badge.textContent = '✓ מפורסם ופעיל'; badge.style.background = 'rgba(20,184,166,0.1)'; badge.style.color = 'var(--accent)';
          statusText.textContent = 'לקוחות יכולים למצוא ולפנות אליך כרגע.';
        }
        document.getElementById('freelancer-save-btn').textContent = 'עדכן פרופיל ציבורי';
      } else {
        badge.textContent = '○ טרם פורסם'; badge.style.background = 'rgba(100,116,139,0.1)'; badge.style.color = 'var(--muted)';
        statusText.textContent = 'מלא את הפרטים ולחץ פרסם — לקוחות יראו אותך מיד.';
        document.getElementById('freelancer-save-btn').textContent = 'פרסם פרופיל ציבורי';
      }
    }
  }

  async function saveProfile() {
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.innerHTML = 'שומר...<span class="spinner"></span>';

    const name = document.getElementById('p-name').value.trim();
    const phone = document.getElementById('p-phone').value.trim();
    const bio = document.getElementById('p-bio').value.trim();

    const { error } = await supabaseClient.from('profiles').upsert({
      id: currentUser.id,
      full_name: name,
      phone, bio,
      email: currentUser.email,
    });

    btn.disabled = false;
    btn.textContent = 'שמור שינויים';

    if (!error) {
      document.getElementById('hero-name').textContent = name;
      document.getElementById('avatar-big').textContent = name.charAt(0).toUpperCase();
      document.getElementById('nav-initial').textContent = name.charAt(0).toUpperCase();
      const msg = document.getElementById('save-msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }
  }

  async function saveFreelancerListing() {
    const errEl = document.getElementById('freelancer-error');
    errEl.style.display = 'none';

    const name = document.getElementById('p-name').value.trim();
    const phone = document.getElementById('p-phone').value.trim().replace(/[^0-9]/g, '');
    const category = document.getElementById('f-category').value;
    const price = document.getElementById('f-price').value;
    const priceUnit = document.getElementById('f-price-unit').value;
    const description = document.getElementById('f-description').value.trim();

    if (!name || !phone || !category || !price || !description) {
      errEl.textContent = 'נא למלא שם וטלפון (למעלה) + תחום, מחיר ותיאור.';
      errEl.style.display = 'block';
      return;
    }
    if (phone.length < 9 || phone.length > 10) {
      errEl.textContent = 'מספר הווטסאפ לא תקין — עדכן בשדה "טלפון / ווטסאפ" למעלה.';
      errEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('freelancer-save-btn');
    btn.disabled = true;
    btn.innerHTML = 'שומר...<span class="spinner"></span>';

    const { error } = await supabaseClient.from('freelancers').upsert({
      user_id: currentUser.id,
      name, whatsapp: phone,
      category, price: Number(price), price_unit: priceUnit,
      description
    }, { onConflict: 'user_id' });

    btn.disabled = false;

    if (error) {
      errEl.textContent = 'שגיאה בשמירה — נסה שוב.';
      errEl.style.display = 'block';
      btn.textContent = 'פרסם / עדכן פרופיל ציבורי';
      return;
    }

    btn.textContent = 'עדכן פרופיל ציבורי';
    document.getElementById('freelancer-status-badge').textContent = '✓ מפורסם ופעיל';
    document.getElementById('freelancer-status-badge').style.background = 'rgba(20,184,166,0.1)';
    document.getElementById('freelancer-status-badge').style.color = 'var(--accent)';
    document.getElementById('freelancer-status-text').textContent = 'לקוחות יכולים למצוא ולפנות אליך כרגע.';

    const msg = document.getElementById('freelancer-save-msg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 3000);
  }

  async function changePassword() {
    const newPw = document.getElementById('new-password').value;
    const confirmPw = document.getElementById('confirm-password').value;
    const errEl = document.getElementById('pass-error');
    errEl.style.display = 'none';

    if (newPw.length < 6) { errEl.textContent = 'הסיסמה חייבת להיות לפחות 6 תווים.'; errEl.style.display = 'block'; return; }
    if (newPw !== confirmPw) { errEl.textContent = 'הסיסמאות לא תואמות.'; errEl.style.display = 'block'; return; }

    const { error } = await supabaseClient.auth.updateUser({ password: newPw });
    if (!error) {
      document.getElementById('new-password').value = '';
      document.getElementById('confirm-password').value = '';
      const msg = document.getElementById('pass-msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    } else {
      errEl.textContent = 'שגיאה בעדכון הסיסמה.'; errEl.style.display = 'block';
    }
  }

  async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = 'index.html';
  }

  async function uploadAvatar(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
      alert('התמונה גדולה מדי — מקסימום 2MB');
      return;
    }

    const avatarEl = document.getElementById('avatar-big');
    avatarEl.innerHTML = '<span style="font-size:0.7rem; opacity:0.7;">טוען...</span>';

    const fileExt = file.name.split('.').pop();
    const fileName = `${currentUser.id}.${fileExt}`;

    // Upload to Supabase Storage
    const { error: uploadError } = await supabaseClient.storage
      .from('avatars')
      .upload(fileName, file, { upsert: true });

    if (uploadError) {
      // Fallback: show as base64 locally
      const reader = new FileReader();
      reader.onload = (e) => {
        avatarEl.innerHTML = `<img src="${e.target.result}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
        document.getElementById('nav-avatar-sm').innerHTML = `<img src="${e.target.result}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" />`;
      };
      reader.readAsDataURL(file);
      return;
    }

    const { data } = supabaseClient.storage.from('avatars').getPublicUrl(fileName);
    const avatarUrl = data.publicUrl + '?t=' + Date.now();

    await supabaseClient.from('profiles').update({ avatar_url: avatarUrl }).eq('id', currentUser.id);

    avatarEl.innerHTML = `<img src="${avatarUrl}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
    document.getElementById('nav-initial').innerHTML = `<img src="${avatarUrl}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" />`;
  }

  function confirmDeleteAccount() {
    document.getElementById('delete-confirm-box').style.display = 'block';
  }

  async function deleteAccount() {
    const confirmText = document.getElementById('delete-confirm-input').value.trim();
    if (confirmText !== 'מחק') {
      alert('כדי לאשר, כתוב בדיוק את המילה "מחק" בתיבה.');
      return;
    }

    // מחיקת פרופיל פרילנסר ציבורי אם קיים (לפי הקישור האמיתי לחשבון)
    await supabaseClient.from('freelancers').delete().eq('user_id', currentUser.id);

    // מחיקת רשומת הפרופיל האישי
    await supabaseClient.from('profiles').delete().eq('id', currentUser.id);

    // התנתקות
    await supabaseClient.auth.signOut();

    alert('החשבון והנתונים שלך נמחקו. אם תרצה להירשם שוב באותו אימייל, פנה אלינו תחילה.');
    window.location.href = 'index.html';
  }

  init();
</script>
</body>
</html>
