<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פרסם פרופיל — Workli</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Work<span>li</span></a>
  <div class="nav-links">
    <a href="browse.html" class="nav-link">חפש פרילנסרים</a>
    <a href="auth.html" class="nav-link" id="nav-auth-link">כניסה</a>
    <a href="auth.html" class="btn-primary" style="padding:9px 20px; font-size:0.88rem;">הרשמה</a>
  </div>
</nav>

<div class="page-header">
  <div class="page-badge">לפרילנסרים</div>
  <h1>פרסם את עצמך ב-2 דקות</h1>
  <p>תמלא פרטים בסיסיים, ולקוחות בישראל יוכלו למצוא אותך ולפנות אליך ישירות בווטסאפ.</p>
</div>

<div class="form-wrap">
  <div class="form-card" id="form-card">
    <form id="signup-form">
      <div class="form-row">
        <label for="name">שם מלא</label>
        <input type="text" id="name" placeholder="לדוגמה: נועה כהן" required />
      </div>

      <div class="form-row">
        <label for="category">תחום עבודה</label>
        <select id="category" required>
          <option value="" disabled selected>בחר תחום</option>
          <option value="עיצוב גרפי">עיצוב גרפי</option>
          <option value="פיתוח אתרים">פיתוח אתרים</option>
          <option value="סושיאל מדיה">סושיאל מדיה</option>
          <option value="עריכת וידאו">עריכת וידאו</option>
          <option value="כתיבה ותוכן">כתיבה ותוכן</option>
          <option value="צילום">צילום</option>
          <option value="שיווק דיגיטלי">שיווק דיגיטלי</option>
          <option value="מוזיקה ופודקאסט">מוזיקה ופודקאסט</option>
          <option value="שיעורים פרטיים">שיעורים פרטיים</option>
          <option value="אחר">אחר</option>
        </select>
      </div>

      <div class="form-row two-col">
        <div>
          <label for="price">מחיר התחלתי</label>
          <div class="price-input-wrap">
            <span class="price-prefix">₪</span>
            <input type="number" id="price" placeholder="150" min="0" required />
          </div>
        </div>
        <div>
          <label for="price-unit">יחידת מחיר</label>
          <select id="price-unit" required>
            <option value="לפרויקט">לפרויקט</option>
            <option value="לשעה">לשעה</option>
            <option value="לפוסט">לפוסט</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <label for="description">תיאור קצר <span class="hint">— מה אתה מציע ולמי</span></label>
        <textarea id="description" placeholder="לדוגמה: מעצב לוגואים ופוסטים לעסקים קטנים." required></textarea>
      </div>

      <div class="form-row">
        <label for="whatsapp">מספר ווטסאפ <span class="hint">— כך לקוחות יפנו אליך</span></label>
        <input type="tel" id="whatsapp" placeholder="05X-XXXXXXX" required />
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">פרסם פרופיל</button>
      <div class="form-error" id="form-error">משהו השתבש — נסה שוב.</div>
    </form>

    <div class="success-card" id="success-card">
      <div class="success-icon">✓</div>
      <h2>הפרופיל שלך פורסם!</h2>
      <p>לקוחות שיחפשו <strong id="success-category"></strong> יראו אותך כבר עכשיו.</p>
      <div class="success-actions">
        <a href="browse.html" class="btn-primary-link">ראה את כל הפרופילים</a>
        <button class="btn-secondary" onclick="resetForm()">פרסם פרופיל נוסף</button>
      </div>
    </div>
  </div>
</div>

<footer>Workli · נבנה בישראל 🇮🇱</footer>

<script src="config.js"></script>
<script>
  const form = document.getElementById('signup-form');
  const submitBtn = document.getElementById('submit-btn');
  const formError = document.getElementById('form-error');
  const successCard = document.getElementById('success-card');

  function validateWhatsapp(value) {
    const digits = value.replace(/[^0-9]/g, '');
    return digits.length >= 9 && digits.length <= 10;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    formError.classList.remove('show');

    const name = document.getElementById('name').value.trim();
    const category = document.getElementById('category').value;
    const price = document.getElementById('price').value;
    const priceUnit = document.getElementById('price-unit').value;
    const description = document.getElementById('description').value.trim();
    const whatsapp = document.getElementById('whatsapp').value.trim();

    if (!name || !category || !price || !description || !whatsapp) {
      formError.textContent = 'נא למלא את כל השדות.';
      formError.classList.add('show');
      return;
    }
    if (!validateWhatsapp(whatsapp)) {
      formError.textContent = 'מספר הווטסאפ לא תקין — נא להזין 9-10 ספרות.';
      formError.classList.add('show');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = 'מפרסם...<span class="spinner"></span>';

    const { error } = await supabaseClient
      .from('freelancers')
      .insert({
        name,
        category,
        price: Number(price),
        price_unit: priceUnit,
        description,
        whatsapp: whatsapp.replace(/[^0-9]/g, '')
      });

    if (error) {
      console.error('Supabase error:', error);
      formError.textContent = 'משהו השתבש בשמירה — נסה שוב בעוד רגע.';
      formError.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'פרסם פרופיל';
      return;
    }

    document.getElementById('success-category').textContent = category;
    form.style.display = 'none';
    successCard.classList.add('show');
  });

  function resetForm() {
    form.reset();
    form.style.display = 'block';
    successCard.classList.remove('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'פרסם פרופיל';
  }
</script>

<script>
  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      const authLink = document.getElementById('nav-auth-link');
      const regBtn = document.querySelector('a[href="auth.html"]');
      if (authLink) authLink.style.display = 'none';
      if (regBtn) { regBtn.textContent = 'החשבון שלי'; regBtn.href = 'account.html'; }
    }
  });
</script>
</body>
</html>
