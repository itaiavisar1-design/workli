<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פרסם פרופיל — Workli</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family:'Heebo',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#F8FAFC; }
    .loader { text-align:center; color:#64748B; }
    .spinner { width:28px; height:28px; border:3px solid #E2E8F0; border-top-color:#14B8A6; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"><div class="spinner"></div><p>מעביר אותך...</p></div>
  <script src="config.js"></script>
  <script>
    // פרסום פרופיל דורש כעת חשבון מחובר — מפנים בהתאם
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      window.location.href = session ? 'account.html' : 'auth.html?role=freelancer';
    });
  </script>
</body>
</html>
