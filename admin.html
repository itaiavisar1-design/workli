<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Workli</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0D0D0D; --white: #F7F6F3; --accent: #4F6EF7;
      --muted: #6B6B6B; --border: #E2E2E2; --card: #FFFFFF;
      --success: #2EAD63; --error: #E0584C; --warn: #F5A623;
    }
    body { font-family: 'Heebo', sans-serif; background: #F0F2FF; color: var(--black); min-height: 100vh; }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 20px;
    }
    .login-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 18px; padding: 40px 36px;
      width: 100%; max-width: 380px; text-align: center;
    }
    .login-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.6rem; margin-bottom: 6px; }
    .login-logo span { color: var(--accent); }
    .login-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }
    .login-card input {
      width: 100%; padding: 13px 16px; border: 1.5px solid var(--border);
      border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 0.95rem;
      outline: none; margin-bottom: 14px; text-align: center; letter-spacing: 4px;
      transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: 'Heebo', sans-serif; transition: background 0.2s;
    }
    .login-btn:hover { background: #3a57e0; }
    .login-error { color: var(--error); font-size: 0.85rem; margin-top: 12px; display: none; }
    .login-error.show { display: block; }

    /* ── ADMIN LAYOUT ── */
    #admin { display: none; }
    nav {
      background: var(--black); color: var(--white);
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 5%; position: sticky; top: 0; z-index: 50;
    }
    .nav-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.2rem; }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-badge { background: var(--accent); color: #fff; border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; font-weight: 700; }
    .logout-btn {
      background: transparent; color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 7px 14px; font-size: 0.82rem; cursor: pointer;
      font-family: 'Heebo', sans-serif; transition: all 0.2s;
    }
    .logout-btn:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

    .main { max-width: 1100px; margin: 0 auto; padding: 36px 5% 80px; }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 36px; }
    .stat-card {
      background: var(--card); border: 1.5px solid var(--border); border-radius: 14px;
      padding: 20px 22px;
    }
    .stat-label { font-size: 0.78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; letter-spacing: -1px; }
    .stat-num.accent { color: var(--accent); }
    .stat-num.warn { color: var(--warn); }
    .stat-num.success { color: var(--success); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      margin-bottom: 20px;
    }
    .toolbar input {
      flex: 1; min-width: 200px; padding: 10px 16px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Heebo', sans-serif; font-size: 0.9rem; outline: none;
      transition: border-color 0.2s;
    }
    .toolbar input:focus { border-color: var(--accent); }
    .toolbar select {
      padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Heebo', sans-serif; font-size: 0.9rem; outline: none;
      background: var(--card); cursor: pointer;
    }

    /* ── TABLE ── */
    .table-wrap { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; }
    .table-head {
      display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 120px;
      padding: 12px 20px; background: #F7F8FF;
      border-bottom: 1.5px solid var(--border);
      font-size: 0.78rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .table-row {
      display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 120px;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      align-items: center; transition: background 0.15s;
    }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: #FAFBFF; }
    .table-row.blocked { opacity: 0.45; background: #FFF5F5; }
    .table-row.flagged { background: #FFFBF0; }

    .row-name { font-weight: 700; font-size: 0.95rem; }
    .row-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .row-cat {
      background: rgba(79,110,247,0.08); color: var(--accent);
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 0.75rem; font-weight: 700;
    }
    .row-price { font-weight: 600; font-size: 0.9rem; }
    .row-date { font-size: 0.8rem; color: var(--muted); }

    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 700;
    }
    .status-active { background: rgba(46,173,99,0.1); color: var(--success); }
    .status-blocked { background: rgba(224,88,76,0.1); color: var(--error); }
    .status-flagged { background: rgba(245,166,35,0.1); color: var(--warn); }

    .actions { display: flex; gap: 6px; }
    .action-btn {
      padding: 6px 10px; border-radius: 7px; font-size: 0.75rem; font-weight: 700;
      cursor: pointer; border: none; font-family: 'Heebo', sans-serif; transition: all 0.15s;
    }
    .btn-block { background: rgba(224,88,76,0.1); color: var(--error); }
    .btn-block:hover { background: var(--error); color: #fff; }
    .btn-unblock { background: rgba(46,173,99,0.1); color: var(--success); }
    .btn-unblock:hover { background: var(--success); color: #fff; }
    .btn-delete { background: rgba(0,0,0,0.06); color: var(--black); }
    .btn-delete:hover { background: var(--error); color: #fff; }

    /* ── MOBILE TABLE ── */
    @media (max-width: 700px) {
      .table-head { display: none; }
      .table-row { grid-template-columns: 1fr; gap: 8px; padding: 16px; }
      .actions { flex-wrap: wrap; }
    }

    /* ── EMPTY / LOADING ── */
    .empty { text-align: center; padding: 48px; color: var(--muted); }
    .loading { text-align: center; padding: 48px; color: var(--muted); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px;
    }

    /* ── BAD WORDS HIGHLIGHT ── */
    .has-flag::after {
      content: '⚠️'; margin-right: 6px; font-size: 0.85rem;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">Work<span>li</span></div>
    <div class="login-sub">כניסה לאזור הניהול</div>
    <input type="password" id="password-input" placeholder="••••••••" />
    <button class="login-btn" onclick="tryLogin()">כניסה</button>
    <div class="login-error" id="login-error">סיסמה שגויה — נסה שוב</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">
  <nav>
    <div class="nav-logo">Work<span>li</span> <span style="font-size:0.7rem; opacity:0.5; font-family:Heebo; font-weight:400;">Admin</span></div>
    <div class="nav-right">
      <span class="nav-badge" id="nav-count">0 פרופילים</span>
      <button class="logout-btn" onclick="logout()">יציאה</button>
    </div>
  </nav>

  <div class="main">
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">סה"כ פרופילים</div>
        <div class="stat-num accent" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">פעילים</div>
        <div class="stat-num success" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">חסומים</div>
        <div class="stat-num" id="stat-blocked">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">לבדיקה</div>
        <div class="stat-num warn" id="stat-flagged">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">תחום פופולרי</div>
        <div style="font-size:1rem; font-weight:700; margin-top:8px;" id="stat-top-cat">—</div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <input type="text" id="search-input" placeholder="🔍  חפש לפי שם, תחום, ווטסאפ..." oninput="filterTable()" />
      <select id="filter-status" onchange="filterTable()">
        <option value="הכל">כל הסטטוסים</option>
        <option value="active">פעיל</option>
        <option value="blocked">חסום</option>
        <option value="flagged">לבדיקה</option>
      </select>
      <select id="filter-cat" onchange="filterTable()">
        <option value="הכל">כל התחומים</option>
      </select>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-head">
        <div>פרילנסר</div>
        <div>תחום</div>
        <div>מחיר</div>
        <div>תאריך</div>
        <div>סטטוס</div>
        <div>פעולות</div>
      </div>
      <div id="table-body">
        <div class="loading"><div class="spinner"></div><br/>טוען נתונים...</div>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
  // ── הגדר כאן את הסיסמה שלך ──
  const ADMIN_PASSWORD = 'workli2025';

  // מילים שידלוגו פרופילים לבדיקה
  const BAD_WORDS = ['זין', 'כוס', 'שרמוטה', 'מניאק', 'בן זונה', 'זבל', 'מזדיין'];

  let allData = [];

  // ── AUTH ──
  function tryLogin() {
    const pw = document.getElementById('password-input').value;
    if (pw === ADMIN_PASSWORD) {
      sessionStorage.setItem('workli_admin', '1');
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('admin').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-error').classList.add('show');
    }
  }
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });
  function logout() {
    sessionStorage.removeItem('workli_admin');
    location.reload();
  }
  if (sessionStorage.getItem('workli_admin')) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin').style.display = 'block';
  }

  // ── UTILS ──
  function hasBadWord(text) {
    const lower = text.toLowerCase();
    return BAD_WORDS.some(w => lower.includes(w.toLowerCase()));
  }
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: '2-digit' });
  }
  function getStatus(row) {
    if (row.blocked) return 'blocked';
    if (row.flagged || hasBadWord(row.name + ' ' + row.description)) return 'flagged';
    return 'active';
  }

  // ── LOAD ──
  async function loadData() {
    const { data, error } = await supabaseClient
      .from('freelancers')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('table-body').innerHTML = '<div class="empty">שגיאה בטעינת הנתונים.</div>';
      return;
    }

    allData = data || [];
    updateStats();
    populateCatFilter();
    renderTable(allData);
  }

  // ── STATS ──
  function updateStats() {
    const total = allData.length;
    const blocked = allData.filter(r => r.blocked).length;
    const flagged = allData.filter(r => !r.blocked && (r.flagged || hasBadWord(r.name + ' ' + r.description))).length;
    const active = total - blocked - flagged;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-blocked').textContent = blocked;
    document.getElementById('stat-flagged').textContent = flagged;
    document.getElementById('nav-count').textContent = total + ' פרופילים';

    // top category
    const catCount = {};
    allData.forEach(r => { catCount[r.category] = (catCount[r.category] || 0) + 1; });
    const top = Object.entries(catCount).sort((a, b) => b[1] - a[1])[0];
    document.getElementById('stat-top-cat').textContent = top ? top[0] : '—';
  }

  // ── FILTERS ──
  function populateCatFilter() {
    const cats = [...new Set(allData.map(r => r.category))];
    const sel = document.getElementById('filter-cat');
    cats.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
  }
  function filterTable() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const status = document.getElementById('filter-status').value;
    const cat = document.getElementById('filter-cat').value;

    const filtered = allData.filter(r => {
      const s = getStatus(r);
      const matchSearch = !q || r.name.toLowerCase().includes(q) || r.category.toLowerCase().includes(q) || r.whatsapp.includes(q) || r.description.toLowerCase().includes(q);
      const matchStatus = status === 'הכל' || s === status;
      const matchCat = cat === 'הכל' || r.category === cat;
      return matchSearch && matchStatus && matchCat;
    });
    renderTable(filtered);
  }

  // ── RENDER ──
  function renderTable(rows) {
    const body = document.getElementById('table-body');
    if (rows.length === 0) {
      body.innerHTML = '<div class="empty">לא נמצאו פרופילים.</div>';
      return;
    }

    body.innerHTML = rows.map(r => {
      const status = getStatus(r);
      const isBad = hasBadWord(r.name + ' ' + r.description);
      const statusBadge = status === 'blocked'
        ? '<span class="status-badge status-blocked">🚫 חסום</span>'
        : status === 'flagged'
        ? '<span class="status-badge status-flagged">⚠️ לבדיקה</span>'
        : '<span class="status-badge status-active">✓ פעיל</span>';

      const blockBtn = status === 'blocked'
        ? `<button class="action-btn btn-unblock" onclick="toggleBlock('${r.id}', false)">שחרר</button>`
        : `<button class="action-btn btn-block" onclick="toggleBlock('${r.id}', true)">חסום</button>`;

      return `
        <div class="table-row ${status === 'blocked' ? 'blocked' : ''} ${status === 'flagged' ? 'flagged' : ''}">
          <div>
            <div class="row-name ${isBad ? 'has-flag' : ''}">${escHtml(r.name)}</div>
            <div class="row-sub">📱 ${r.whatsapp}</div>
            <div class="row-sub" style="margin-top:4px; font-size:0.75rem;">${escHtml(r.description.slice(0, 60))}${r.description.length > 60 ? '...' : ''}</div>
          </div>
          <div><span class="row-cat">${escHtml(r.category)}</span></div>
          <div class="row-price">₪${r.price} <span style="font-size:0.75rem; color:var(--muted)">/ ${escHtml(r.price_unit)}</span></div>
          <div class="row-date">${formatDate(r.created_at)}</div>
          <div>${statusBadge}</div>
          <div class="actions">
            ${blockBtn}
            <button class="action-btn btn-delete" onclick="deleteRow('${r.id}')">מחק</button>
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── ACTIONS ──
  async function toggleBlock(id, block) {
    const { error } = await supabaseClient
      .from('freelancers')
      .update({ blocked: block })
      .eq('id', id);
    if (!error) await loadData();
  }

  async function deleteRow(id) {
    if (!confirm('האם למחוק את הפרופיל הזה לצמיתות?')) return;
    const { error } = await supabaseClient
      .from('freelancers')
      .delete()
      .eq('id', id);
    if (!error) await loadData();
  }
</script>
</body>
</html>
