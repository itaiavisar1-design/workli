<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הרשמה / כניסה — Workli</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; background:#F0F2FF; }
    .auth-card { background:#fff; border:1.5px solid var(--border); border-radius:20px; padding:40px 36px; width:100%; max-width:420px; }
    .auth-logo { text-align:center; margin-bottom:28px; }
    .auth-logo a { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.8rem; color:var(--black); text-decoration:none; }
    .auth-logo a span { color:var(--accent); }
    .auth-tabs { display:flex; margin-bottom:28px; border:1.5px solid var(--border); border-radius:10px; overflow:hidden; }
    .auth-tab { flex:1; padding:11px; text-align:center; font-size:0.92rem; font-weight:700; cursor:pointer; border:none; background:transparent; font-family:'Heebo',sans-serif; color:var(--muted); transition:all 0.2s; }
    .auth-tab.active { background:var(--accent); color:#fff; }
    .auth-form { display:flex; flex-direction:column; gap:14px; }
    .auth-form input { width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:10px; font-family:'Heebo',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s; background:#fff; }
    .auth-form input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,110,247,0.1); }
    .role-select { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .role-btn { padding:14px 10px; border:1.5px solid var(--border); border-radius:10px; text-align:center; cursor:pointer; transition:all 0.2s; background:#fff; font-family:'Heebo',sans-serif; }
    .role-btn.active { border-color:var(--accent); background:rgba(79,110,247,0.06); }
    .role-icon { font-size:1.6rem; margin-bottom:6px; }
    .role-name { font-size:0.88rem; font-weight:700; }
    .role-desc { font-size:0.75rem; color:var(--muted); margin-top:2px; }
    .divider { display:flex; align-items:center; gap:12px; color:var(--muted); font-size:0.82rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .btn-google { width:100%; padding:13px; border:1.5px solid var(--border); border-radius:10px; background:#fff; font-family:'Heebo',sans-serif; font-size:0.95rem; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:all 0.2s; color:var(--black); }
    .btn-google:hover { border-color:#4285F4; }
    .btn-google img { width:18px; height:18px; }
    .btn-submit { width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-family:'Heebo',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .btn-submit:hover { background:#3a57e0; }
    .btn-submit:disabled { opacity:0.6; cursor:not-allowed; }
    .msg { border-radius:10px; padding:12px 16px; font-size:0.88rem; font-weight:600; display:none; text-align:center; }
    .msg.error { background:rgba(224,88,76,0.08); border:1px solid rgba(224,88,76,0.25); color:#E0584C; }
    .msg.success { background:rgba(46,173,99,0.08); border:1px solid rgba(46,173,99,0.25); color:#2EAD63; }
    .msg.show { display:block; }
    .label { font-size:0.85rem; font-weight:700; margin-bottom:4px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-left:8px; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo"><a href="index.html">Work<span>li</span></a></div>

  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('register')">הרשמה</button>
    <button class="auth-tab" onclick="switchTab('login')">כניסה</button>
  </div>

  <!-- REGISTER -->
  <div id="form-register" class="auth-form">
    <div>
      <div class="label" style="margin-bottom:8px;">אני...</div>
      <div class="role-select">
        <div class="role-btn active" id="role-freelancer" onclick="selectRole('freelancer')">
          <div class="role-icon">👤</div>
          <div class="role-name">פרילנסר</div>
          <div class="role-desc">רוצה להרוויח</div>
        </div>
        <div class="role-btn" id="role-client" onclick="selectRole('client')">
          <div class="role-icon">🏢</div>
          <div class="role-name">לקוח</div>
          <div class="role-desc">מחפש כישרון</div>
        </div>
      </div>
    </div>
    <input type="text" id="reg-name" placeholder="שם מלא" />
    <input type="email" id="reg-email" placeholder="אימייל" />
    <input type="password" id="reg-password" placeholder="סיסמה (לפחות 6 תווים)" />
    <div class="msg error" id="reg-error"></div>
    <div class="msg success" id="reg-success"></div>
    <button class="btn-submit" id="reg-btn" onclick="register()">צור חשבון</button>
    <div class="divider">או</div>
    <button class="btn-google" onclick="loginGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      המשך עם Google
    </button>
  </div>

  <!-- LOGIN -->
  <div id="form-login" class="auth-form" style="display:none;">
    <input type="email" id="login-email" placeholder="אימייל" />
    <input type="password" id="login-password" placeholder="סיסמה" />
    <div class="msg error" id="login-error"></div>
    <button class="btn-submit" id="login-btn" onclick="loginEmail()">כניסה</button>
    <div class="divider">או</div>
    <button class="btn-google" onclick="loginGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      המשך עם Google
    </button>
    <div style="text-align:center; font-size:0.85rem; color:var(--muted);">
      שכחת סיסמה? <a href="#" onclick="resetPassword()" style="color:var(--accent); font-weight:600;">לחץ כאן</a>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
  let selectedRole = 'freelancer';

  // אם כבר מחובר — הפנה לדשבורד
  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session) goToDashboard(session.user);
  });

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) goToDashboard(session.user);
  });

  async function goToDashboard(user) {
    try {
      const { data: profile } = await supabaseClient
        .from('profiles').select('role').eq('id', user.id).maybeSingle();
      const role = profile?.role || user.user_metadata?.role || 'client';
      window.location.href = role === 'freelancer' ? 'dashboard-freelancer.html' : 'dashboard-client.html';
    } catch(e) {
      window.location.href = 'dashboard-client.html';
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='register')));
    document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
    document.getElementById('form-login').style.display = tab === 'login' ? 'flex' : 'none';
  }

  function selectRole(role) {
    selectedRole = role;
    document.getElementById('role-freelancer').classList.toggle('active', role === 'freelancer');
    document.getElementById('role-client').classList.toggle('active', role === 'client');
  }

  function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg; el.className = 'msg ' + type + ' show';
    if (type === 'error') setTimeout(() => el.classList.remove('show'), 5000);
  }

  async function register() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!name || !email || !password) return showMsg('reg-error', 'נא למלא את כל השדות.', 'error');
    if (password.length < 6) return showMsg('reg-error', 'הסיסמה חייבת להיות לפחות 6 תווים.', 'error');

    const btn = document.getElementById('reg-btn');
    btn.disabled = true;
    btn.innerHTML = 'יוצר חשבון...<span class="spinner"></span>';

    const { data, error } = await supabaseClient.auth.signUp({
      email, password,
      options: { data: { full_name: name, role: selectedRole } }
    });

    if (error) {
      const msg = error.message.includes('already') ? 'האימייל הזה כבר רשום — נסה להתחבר.' : 'שגיאה ביצירת החשבון: ' + error.message;
      showMsg('reg-error', msg, 'error');
      btn.disabled = false; btn.textContent = 'צור חשבון';
      return;
    }

    // שמור פרופיל
    if (data.user) {
      await supabaseClient.from('profiles').upsert({
        id: data.user.id, full_name: name,
        role: selectedRole, email
      });
    }

    showMsg('reg-success', 'החשבון נוצר! מעביר אותך לדשבורד...', 'success');
    btn.disabled = false; btn.textContent = 'צור חשבון';
  }

  async function loginEmail() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showMsg('login-error', 'נא למלא אימייל וסיסמה.', 'error');

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = 'נכנס...<span class="spinner"></span>';

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      showMsg('login-error', 'אימייל או סיסמה שגויים.', 'error');
      btn.disabled = false; btn.textContent = 'כניסה';
      return;
    }
    goToDashboard(data.user);
  }

  async function loginGoogle() {
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/auth.html' }
    });
    if (error) showMsg('reg-error', 'שגיאה בחיבור ל-Google. נסה אימייל וסיסמה.', 'error');
  }

  async function resetPassword() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) return showMsg('login-error', 'הכנס אימייל קודם.', 'error');
    await supabaseClient.auth.resetPasswordForEmail(email);
    showMsg('login-error', 'נשלח קישור לאיפוס סיסמה לאימייל שלך.', 'error');
  }
</script>
</body>
</html>
