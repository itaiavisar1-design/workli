<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חפש פרילנסרים — Workli</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .toolbar-row { max-width:1000px; margin:0 auto; padding:0 5% 24px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .toolbar-row input, .toolbar-row select {
      padding:10px 18px; border:1.5px solid var(--border); border-radius:100px;
      font-family:'Heebo',sans-serif; font-size:0.88rem; font-weight:600;
      background:var(--card-bg); outline:none; cursor:pointer;
      transition: border-color 0.2s;
    }
    .toolbar-row input { flex:1; min-width:180px; cursor:text; }
    .toolbar-row input:focus, .toolbar-row select:focus { border-color:var(--accent); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Work<span>li</span></a>
  <div class="nav-links">
    <a href="signup.html" class="nav-link">פרסם פרופיל</a>
    <a href="browse.html" class="nav-link active">חפש פרילנסרים</a>
  </div>
</nav>

<div class="page-header">
  <div class="page-badge">למחפשי כישרון</div>
  <h1>מצא פרילנסר עכשיו</h1>
  <p>סנן לפי תחום ומחיר, ופנה ישירות בווטסאפ — בלי תיווך, בלי המתנה.</p>
</div>

<div class="filters" id="filters">
  <button class="filter-chip active" data-cat="הכל">הכל</button>
</div>

<div class="toolbar-row">
  <select id="filter-price">
    <option value="all">💰 כל המחירים</option>
    <option value="0-100">עד ₪100</option>
    <option value="100-300">₪100 – ₪300</option>
    <option value="300-500">₪300 – ₪500</option>
    <option value="500p">₪500+</option>
  </select>
  <input type="text" id="search-input" placeholder="🔍 חפש שם או תחום..." />
</div>

<div class="results-wrap">
  <div class="loading-state" id="loading-state">
    <div class="spinner-lg"></div>
    <p>טוען פרופילים...</p>
  </div>
  <div id="results-container" style="display:none;">
    <div class="results-count" id="results-count"></div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">👀</div>
    <h2>אין עדיין פרופילים בקטגוריה זו</h2>
    <p>היה הראשון לפרסם פרופיל בתחום שלך ותתפוס מקום מובחר.</p>
    <a href="signup.html" class="btn-primary-link">פרסם פרופיל</a>
  </div>
</div>

<footer>Workli · נבנה בישראל 🇮🇱</footer>

<script src="config.js"></script>
<script>
  const ALL_CATEGORIES = [
    'עיצוב גרפי','פיתוח אתרים','סושיאל מדיה','עריכת וידאו',
    'כתיבה ותוכן','צילום','שיווק דיגיטלי','AI Automation',
    'מוזיקה ופודקאסט','שיעורים פרטיים','אחר'
  ];

  let allFreelancers = [];
  let currentCat = 'הכל';

  const loadingState = document.getElementById('loading-state');
  const resultsContainer = document.getElementById('results-container');
  const emptyState = document.getElementById('empty-state');
  const cardsGrid = document.getElementById('cards-grid');
  const resultsCount = document.getElementById('results-count');
  const filtersWrap = document.getElementById('filters');

  function escHtml(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
  function getInitial(name) { return name.trim().charAt(0).toUpperCase(); }

  function renderFilters(cats) {
    filtersWrap.innerHTML = '';
    ['הכל', ...cats].forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-chip' + (cat === currentCat ? ' active' : '');
      btn.dataset.cat = cat;
      btn.textContent = cat;
      btn.addEventListener('click', () => { currentCat = cat; renderFilters(cats); applyFilters(); });
      filtersWrap.appendChild(btn);
    });
  }

  function applyFilters() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const priceRange = document.getElementById('filter-price').value;

    const filtered = allFreelancers.filter(f => {
      const matchCat = currentCat === 'הכל' || f.category === currentCat;
      const matchQ = !q || f.name.toLowerCase().includes(q) || f.category.toLowerCase().includes(q) || f.description.toLowerCase().includes(q);
      let matchPrice = true;
      if (priceRange === '0-100') matchPrice = f.price <= 100;
      else if (priceRange === '100-300') matchPrice = f.price > 100 && f.price <= 300;
      else if (priceRange === '300-500') matchPrice = f.price > 300 && f.price <= 500;
      else if (priceRange === '500p') matchPrice = f.price > 500;
      return matchCat && matchQ && matchPrice;
    });

    if (filtered.length === 0) {
      resultsContainer.style.display = 'none';
      emptyState.classList.add('show');
      return;
    }
    emptyState.classList.remove('show');
    resultsContainer.style.display = 'block';
    resultsCount.textContent = filtered.length + ' פרילנסרים נמצאו';
    cardsGrid.innerHTML = filtered.map(f => `
      <div class="freelancer-card">
        <div class="card-top">
          <div style="display:flex;align-items:flex-start;gap:12px;">
            <div class="card-avatar">${escHtml(getInitial(f.name))}</div>
            <div class="card-name-wrap">
              <div class="card-name">${escHtml(f.name)}</div>
              <div class="card-category">${escHtml(f.category)}</div>
            </div>
          </div>
          <div class="card-price">₪${f.price}<span> / ${escHtml(f.price_unit)}</span></div>
        </div>
        <div class="card-desc">${escHtml(f.description)}</div>
        <a class="card-btn" target="_blank" rel="noopener"
           href="https://wa.me/972${f.whatsapp.replace(/^0/,'')}?text=${encodeURIComponent('היי '+f.name+', ראיתי את הפרופיל שלך ב-Workli ורציתי לדבר על עבודה')}">
          💬 פנה בווטסאפ
        </a>
      </div>
    `).join('');
  }

  async function loadFreelancers() {
    const { data, error } = await supabaseClient
      .from('freelancers')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      loadingState.innerHTML = '<p>לא הצלחנו לטעון פרופילים. נסה לרענן.</p>';
      return;
    }

    allFreelancers = (data || []).filter(f => !f.blocked);
    const presentCats = ALL_CATEGORIES.filter(c => allFreelancers.some(f => f.category === c));
    renderFilters(presentCats);
    loadingState.style.display = 'none';
    applyFilters();

    // URL param: ?cat=עיצוב גרפי
    const params = new URLSearchParams(window.location.search);
    const catParam = params.get('cat');
    if (catParam && presentCats.includes(catParam)) {
      currentCat = catParam;
      renderFilters(presentCats);
      applyFilters();
    }
  }

  document.getElementById('filter-price').addEventListener('change', applyFilters);
  document.getElementById('search-input').addEventListener('input', applyFilters);

  loadFreelancers();
</script>
</body>
</html>
